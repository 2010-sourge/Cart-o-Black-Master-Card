<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Master Card – Flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <div class="scene">
 
    <div class="card-wrapper">
      <div class="card-inner">
 
        <!-- ══ FRENTE ══ -->
        <div class="card-face card-front">
          <div class="waves-bg"></div>
 
          <div class="front-top">
            <div class="mc-logo">
              <div class="mc-circles">
                <div class="mc-circle mc-red"></div>
                <div class="mc-circle mc-orange"></div>
              </div>
              <span class="mc-name">Master Card</span>
            </div>
            <div class="chip">
              <div class="chip-body">
                <div class="chip-line h"></div>
                <div class="chip-line v"></div>
                <div class="chip-center"></div>
              </div>
            </div>
          </div>
 
          <div class="front-middle">
            <p class="card-number-label">Card Number</p>
            <p class="card-number">8050 5040 2030 3020</p>
          </div>
 
          <div class="front-bottom">
            <span class="card-holder">Prem Kumar Shahi</span>
            <div class="valid-block">
              <span class="valid-label">Valid Thru</span>
              <span class="valid-date">05/28</span>
            </div>
          </div>
        </div>
 
        <!-- ══ VERSO ══ -->
        <div class="card-face card-back">
          <div class="waves-bg"></div>
 
          <div class="magnetic-strip"></div>
 
          <div class="cvv-area">
            <div class="cvv-tape">
              <span class="cvv-dots">• • • • • • •</span>
              <span class="cvv-number">742</span>
            </div>
            <p class="cvv-label">CVV</p>
          </div>
 
          <div class="back-footer">
            <p class="back-info">Este cartão é de propriedade do banco emissor.<br>Em caso de dúvidas ligue: 0800 000 0000</p>
            <div class="mc-circles small">
              <div class="mc-circle mc-red"></div>
              <div class="mc-circle mc-orange"></div>
            </div>
          </div>
        </div>
 
      </div>
    </div>
 
    <p class="hint">passe o mouse para virar o cartão</p>
  </div>
 
</body>
</html>
